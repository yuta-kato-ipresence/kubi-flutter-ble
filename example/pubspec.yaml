name: kubi_flutter_ble_example
description: Example app for kubi_flutter_ble

publish_to: 'none'

version: 0.1.0

environment:
  sdk: ^3.11.0
  flutter: ^3.32.0

dependencies:
  flutter:
    sdk: flutter
  kubi_flutter_ble:
    path: ../

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# example は独立した root として pub get するため、親と同じ override を再宣言する必要がある。
dependency_overrides:
  universal_ble:
    path: ../third_party/universal_ble

flutter:
